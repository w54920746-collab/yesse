<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --border-color: #dbdbdb;
            --text-color: #262626;
            --text-muted: #8e8e8e;
            --link-blue: #0095f6;
            --heart-red: #ed4956;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 60px; /* Отступ под фиксированную шапку */
        }

        /* Навигационная панель (Шапка) */
        .navbar {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 60px;
            background-color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 0 20px;
        }

        .nav-container {
            width: 100%;
            max-width: 975px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            font-style: italic;
            letter-spacing: -0.5px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-color);
        }

        .search-bar {
            width: 268px;
            padding: 7px 16px;
            background-color: #efefef;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .nav-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            text-decoration: none;
        }

        .logout-btn {
            color: var(--heart-red);
        }

        /* Основной контент */
        .main-container {
            max-width: 935px;
            margin: 30px auto 0 auto;
            display: flex;
            gap: 28px;
            padding: 0 20px;
        }

        /* Лента постов */
        .feed {
            flex: 1;
            max-width: 614px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Карточка поста */
        .post-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #dbdbdb;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
        }

        .username {
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .username:hover {
            text-decoration: underline;
        }

        .post-img-wrapper {
            width: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }

        .post-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px 8px 16px;
        }

        .left-actions {
            display: flex;
            gap: 16px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.1s ease;
        }

        .action-btn:active {
            transform: scale(1.2);
        }

        .like-btn.liked {
            color: var(--heart-red);
        }

        .post-info {
            padding: 0 16px 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 14px;
        }

        .likes-count {
            font-weight: 600;
        }

        .caption span b {
            margin-right: 6px;
        }

        .comments-link {
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            margin-top: 4px;
        }

        /* Боковая панель (Правая колонка) */
        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-top: 10px;
        }

        @media (max-width: 1000px) {
            .sidebar {
                display: none; /* Прячем сайдбар на мобилках и узких экранах */
            }
            .main-container {
                justify-content: center;
            }
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-suggestions {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-suggestions h4 {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .follow-link {
            color: var(--link-blue);
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">ЛентаРемейк</a>
            <input type="text" class="search-bar" placeholder="Поиск">
            <div class="nav-actions">
                <span class="nav-btn" id="current-user-display">Пользователь</span>
                <button class="nav-btn logout-btn" onclick="handleLogout()">Выйти</button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        
        <main class="feed" id="feed-container">
            </main>

        <aside class="sidebar">
            <div class="sidebar-user">
                <div class="user-info">
                    <div class="avatar" id="sidebar-avatar">?</div>
                    <div>
                        <div class="username" id="sidebar-username">username</div>
                        <div style="color: var(--text-muted); font-size: 12px;" id="sidebar-fullname">Имя аккаунта</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-suggestions">
                <h4>Рекомендации для вас</h4>
                
                <div class="suggestion-item">
                    <div class="user-info">
                        <div class="avatar">M</div>
                        <div class="username">memes_king</div>
                    </div>
                    <span class="follow-link" onclick="this.innerText = this.innerText === 'Подписаться' ? 'Подписан' : 'Подписаться'">Подписаться</span>
                </div>

                <div class="suggestion-item">
                    <div class="user-info">
                        <div class="avatar">W</div>
                        <div class="username">web_developer</div>
                    </div>
                    <span class="follow-link" onclick="this.innerText = this.innerText === 'Подписаться' ? 'Подписан' : 'Подписаться'">Подписаться</span>
                </div>

                <div class="suggestion-item">
                    <div class="user-info">
                        <div class="avatar">C</div>
                        <div class="username">cats_of_world</div>
                    </div>
                    <span class="follow-link" onclick="this.innerText = this.innerText === 'Подписаться' ? 'Подписан' : 'Подписаться'">Подписаться</span>
                </div>
            </div>
        </aside>

    </div>

    <script>
        // Проверка авторизации. Если токена нет — выкидываем назад на index.html
        if (localStorage.getItem("session_token") !== "active") {
            window.location.href = "index.html";
        }

        // Берем имя пользователя из памяти
        const currentUsername = localStorage.getItem("username") || "Гость";
        document.getElementById('current-user-display').innerText = currentUsername;
        document.getElementById('sidebar-username').innerText = currentUsername;
        document.getElementById('sidebar-fullname').innerText = "Тестовый Аккаунт";
        document.getElementById('sidebar-avatar').innerText = currentUsername.charAt(0);

        // Функция выхода
        function handleLogout() {
            localStorage.removeItem("session_token");
            localStorage.removeItem("username");
            window.location.href = "index.html";
        }

        // Моковые (готовые) посты для красивого рендера
        const mockPosts = [
            {
                id: 1,
                author: "nature_pics",
                avatar: "N",
                img: "https://picsum.photos/id/10/600/600",
                likes: 124,
                caption: "Прекрасный вид на утренние горы. Всем хорошего продуктивного дня! ⛰️✨"
            },
            {
                id: 2,
                author: "street_style",
                avatar: "S",
                img: "https://picsum.photos/id/26/600/600",
                likes: 89,
                caption: "Архитектура старого города завораживает. Ловите эстетику в ленту."
            },
            {
                id: 3,
                author: "coffee_lover",
                avatar: "C",
                img: "https://picsum.photos/id/63/600/600",
                likes: 256,
                caption: "Сначала кофе, потом все остальные важные дела. Согласны? ☕"
            }
        ];

        // Функция генерации постов на странице
        function renderFeed() {
            const feedContainer = document.getElementById('feed-container');
            feedContainer.innerHTML = ""; // чистим контейнер

            mockPosts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <div class="user-info">
                            <div class="avatar">${post.avatar}</div>
                            <div class="username">${post.author}</div>
                        </div>
                        <b style="cursor:pointer; color: var(--text-muted)">•••</b>
                    </div>
                    
                    <div class="post-img-wrapper">
                        <img src="${post.img}" class="post-img" alt="Фото поста">
                    </div>

                    <div class="post-actions">
                        <div class="left-actions">
                            <button class="action-btn like-btn" onclick="toggleLike(this, ${post.id})">🤍</button>
                            <button class="action-btn">💬</button>
                            <button class="action-btn">✈️</button>
                        </div>
                        <button class="action-btn">🔖</button>
                    </div>

                    <div class="post-info">
                        <div class="likes-count"><span id="likes-val-${post.id}">${post.likes}</span> отметок «Мне нравится»</div>
                        <div class="caption">
                            <span><b>${post.author}</b>${post.caption}</span>
                        </div>
                        <div class="comments-link">Посмотреть все комментарии</div>
                    </div>
                `;
                feedContainer.appendChild(card);
            });
        }

        // Простой интерактивный лайк
        function toggleLike(btn, postId) {
            const likesCountSpan = document.getElementById(`likes-val-${postId}`);
            let currentLikes = parseInt(likesCountSpan.innerText);

            if (btn.classList.contains('liked')) {
                btn.classList.remove('liked');
                btn.innerText = "🤍";
                likesCountSpan.innerText = currentLikes - 1;
            } else {
                btn.classList.add('liked');
                btn.innerText = "❤️";
                likesCountSpan.innerText = currentLikes + 1;
            }
        }

        // Запускаем рендер при загрузке страницы
        renderFeed();
    </script>
</body>
</html>
